<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Joel Prebish</title>
    <link rel="stylesheet" href="static/style.css">
</head>


<body>
    <header>
        <div class="header-container">
            <div class="header-brand">
                <span class="brand-name">Joel Prebish</span>
                <span class="brand-tagline">Software Engineer | Developer</span>
            </div>
            <nav class="header-nav">
                <a href="#bio" class="nav-link active" >Featured</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#cv" class="nav-link">CV</a>
            </nav>
        </div>
    </header>
    <div id="business-card" class="steam-lift" title="Business Card"></div>

    <div class="card-separator"></div>

    <section id="bio" class="bio-section">
        <template id="milestone-template">
            <div class="timeline-item">
                <div class="timeline-icon"><i></i></div>
                <div class="timeline-content">
                    <span class="timeline-date"></span>
                    <h3 class="timeline-title"></h3>
                    <span class="timeline-org"></span>
                    <p class="timeline-description"></p>
                </div>
            </div>
        </template>
        <div class="timeline"></div>
    </section>
    <section id="projects" class="bio-section">
        <!-- Template for project cards -->
        <template id="project-template">
            <div class="project-card">
                <div class="project-header">
                    <i class="fas fa-code-branch project-icon"></i>
                    <h3 class="project-name"></h3>
                    <span class="project-stars"><i class="fas fa-star"></i> <span class="stars-count"></span></span>
                    <span class="project-lock"><i class="fas fa-lock"></i></span>
                </div>
                <p class="project-description"></p>
                <div class="project-topics"></div>
                <div class="project-meta">
                    <span class="project-language"><span class="lang-dot"></span><span class="lang-name"></span></span>
                    <span class="project-forks"><i class="fas fa-code-branch"></i> <span class="forks-count"></span></span>
                </div>
            </div>
        </template>
        <div class="projects-controls">
            <div class="projects-search">
                <i class="fas fa-search projects-search-icon"></i>
                <input type="text" class="projects-search-input" placeholder="Search projects…" autocomplete="off" spellcheck="false">
            </div>
            <div class="projects-controls-row">
                <div class="projects-sort">
                    <span class="controls-label"><i class="fas fa-sort-amount-down"></i> Sort</span>
                    <button class="sort-btn active" data-sort="date">Date</button>
                    <button class="sort-btn" data-sort="stars">Stars</button>
                    <button class="sort-btn" data-sort="size">Size</button>
                </div>
                <div class="controls-sep"></div>
                <div class="projects-tags">
                    <span class="controls-label"><i class="fas fa-tag"></i> Filter</span>
                    <div class="tags-list"></div>
                </div>
            </div>
        </div>
        <div class="projects-grid"></div>
    </section>

    <section id="cv" class="bio-section">
    </section>
    <script src="static/style.js"></script>
</body>

</html>
