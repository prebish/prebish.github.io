<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="main_styles.css">
</head>

<body>

    <!-- H E A D E R -->
    <div id="header">
        <button id="menu-btn", onclick="toggleMenu()">≡</button>
        <div id="title"><strong>Favorite Websites</strong></div>
        <button id="dark-mode-btn", onclick="toggleColors()">🌓</button>
    </div>



    <!-- M E N U   C A R D S -->

    <!-- section -->
    <div class="menu-card-section-header">
        <h1>- Tools -</h1>
    </div><br><br>
    <!-- cards -->
    <div class="card-container">
    <a href="">
    <div class="menu-card">
        <img class="main-img" src="static-img\" alt="webp">
        <p class="main-img-description">
            <strong>Image Upscaler</strong>
            <br>
            <small>Enhance in batch processes</small>
        </p>
    </div></a>
    </div><br><br>

    <!-- section -->
    <div class="menu-card-section-header">
        <h1>- Misc -</h1>
    </div><br><br>
    <!-- cards -->
    <div class="card-container">
    <a href="https://github.com/prebish/redstone-tools-mcaddon">
    <div class="menu-card">
        <img class="main-img" src="static-img\redstone.png" alt="redstone-img">
        <p class="main-img-description">
            <strong>Redstone Tools Mod</strong>
            <br>
            <small>for Minecraft: Bedrock</small>
        </p>
    </div></a>
    <a href="https://github.com/prebish/python-projects-hub">
    <div class="menu-card">
        <img class="main-img" src="static-img\python.png" alt="python-img">
        <p class="main-img-description">
            <strong>Python Projects Hub</strong>
            <br>
            <small>FREE educational projects</small>
        </p>
    </div></a>
    </div><br><br>



    <!-- O V E R L A Y   M E N U -->
    <div id="menuOverlay" hidden>
        <ul id="overlayList">
            <li class="overlayListItems">
                <label class="overlayButtons">
                    <a href="Projects.html" class="overlayLinks">⚒️ Project Center</a>
                </label>
            </li>
            <li class="overlayListItems">
                <label class="overlayButtons">
                    <a href="Favorites.html" class="overlayLinks">⭐ Favorites Sites</a>
                </label>
            </li>
        </ul>
    </div>


    
    <!-- S C R I P T I N G -->
    <script>
        function toggleMenu() {
            var menu = document.getElementById("menuOverlay");
            if (menu.style.display === "none" || menu.style.display === "") {
                menu.style.display = "block";
            } else {
                menu.style.display = "none";
            }
        }

        let darkMode = true;

        function toggleColors() {
            const root = document.documentElement;
            if (darkMode) {
                root.style.setProperty('--text', 'var(--text-lm)');
                root.style.setProperty('--background', 'var(--background-lm)');
                root.style.setProperty('--elem-background', 'var(--elem-background-lm)');
            } else {
                root.style.setProperty('--text', 'var(--text-dm)');
                root.style.setProperty('--background', 'var(--background-dm)');
                root.style.setProperty('--elem-background', 'var(--elem-background-dm)');
            }
            darkMode = !darkMode;
        }
    </script>
</body>
</html>
